<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Due Wattana</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Georgia', serif;
    }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background-color: #c4b5a0;
      background-image:
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 60px,
          rgba(255,255,255,0.03) 60px,
          rgba(255,255,255,0.03) 120px
        );
      /* Replace the above with:
         background-image: url('your-photo.jpg');
         background-size: cover;
         background-position: center;
         when you have your image ready */
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      background: rgba(0, 0, 0, 0.25);
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 40px;
    }

    .logo {
      font-size: 22px;
      color: #ffffff;
      text-decoration: none;
      opacity: 0.9;
    }

    .nav-links {
      display: flex;
      gap: 28px;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      color: #ffffff;
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.75;
      transition: opacity 0.2s;
    }

    .nav-links a:hover {
      opacity: 1;
    }

    main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px 80px;
    }

    .pill {
      display: inline-block;
      background: rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.85);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 24px;
      border: 0.5px solid rgba(255, 255, 255, 0.3);
    }

    h1 {
      font-size: 52px;
      font-weight: 400;
      color: #ffffff;
      letter-spacing: -1px;
      margin-bottom: 12px;
      text-shadow: 0 1px 20px rgba(0,0,0,0.2);
    }

    .cities {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.65);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 44px;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: rgba(255, 255, 255, 0.35);
      margin: 0 auto 44px;
    }

    .page-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .page-links a {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.75);
      text-decoration: none;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-bottom: 0.5px solid rgba(255, 255, 255, 0.35);
      padding-bottom: 3px;
      transition: color 0.2s, border-color 0.2s;
    }

    .page-links a:hover {
      color: #ffffff;
      border-bottom-color: rgba(255, 255, 255, 0.8);
    }

    footer {
      position: relative;
      z-index: 10;
      padding: 20px 40px;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      text-align: center;
      letter-spacing: 0.06em;
    }

    /* Mobile */
    @media (max-width: 600px) {
      nav {
        padding: 20px 24px;
      }

      .nav-links {
        gap: 18px;
      }

      h1 {
        font-size: 36px;
      }

      .page-links {
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="overlay"></div>

  <nav>
    <a class="logo" href="index.html">W.</a>
    <ul class="nav-links">
      <li><a href="research.html">Research</a></li>
      <li><a href="design.html">Design</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>
    <div class="pill">Urban researcher · Creative designer</div>
    <h1>Due Wattana</h1>
    <p class="cities">Bangkok · Glasgow · London</p>
    <div class="divider"></div>
    <ul class="page-links">
      <li><a href="research.html">Research</a></li>
      <li><a href="design.html">Design</a></li>
      <li><a href="https://www.instagram.com/studio.wattana" target="_blank">Instagram</a></li>
      <li><a href="https://scholar.google.com" target="_blank">Scholar</a></li>
    </ul>
  </main>

  <footer>duewattana.com · wattanasong@outlook.com</footer>

</body>
</html>
